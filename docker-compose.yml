services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance_dashboard
    ports:
      - "5432:5432"
    volumes:
      - finance_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  finance_pg_data:
